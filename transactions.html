<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions — Holdwise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --bg-card: #1C1C1E;
      --bg-card-2: #2C2C2E;
      --border: rgba(255,255,255,0.07);
      --text: #fff;
      --text-muted: rgba(255,255,255,0.45);
      --accent: #6C5CE7;
      --accent-2: #00D4FF;
      --green: #30D158;
      --red: #FF453A;
      --sidebar-w: 72px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; opacity: 0; transition: opacity 0.4s ease;
    }
    body.loaded { opacity: 1; }
    body.fade-out { opacity: 0; transition: opacity 0.25s ease; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w); background: #111;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; z-index: 100;
    }
    .sidebar-logo { padding: 24px 0 28px; display: flex; justify-content: center; text-decoration: none; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #fff;
    }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; width: 100%; padding: 0 8px; }
    .nav-item {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 13px 0; border-radius: 12px;
      color: var(--text-muted); text-decoration: none;
      border: none; background: none; cursor: pointer; font-family: inherit;
      transition: color 0.2s, background 0.2s; position: relative;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .nav-item.active { color: var(--text); background: rgba(255,255,255,0.1); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-tooltip {
      position: absolute; left: calc(100% + 10px);
      background: var(--bg-card); color: var(--text); font-size: 12px; font-weight: 600;
      padding: 5px 10px; border-radius: 8px; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
      border: 1px solid var(--border); z-index: 200;
    }
    .nav-item:hover .nav-tooltip { opacity: 1; }
    .sidebar-bottom { padding: 16px 8px 24px; width: 100%; }
    .nav-item.logout { color: var(--red); }
    .nav-item.logout:hover { background: rgba(255,67,58,0.1); color: var(--red); }

    /* ── Content ── */
    .content { margin-left: var(--sidebar-w); padding: 0 32px 48px; min-height: 100vh; }

    /* ── Page header ── */
    .page-header { padding: 36px 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; }
    .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    .search-input {
      width: 100%; padding: 11px 16px 11px 40px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 100px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(108,92,231,0.5); }
    .filter-select {
      padding: 11px 16px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 100px;
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; cursor: pointer;
    }
    .filter-select option { background: var(--bg-card); }

    /* ── 2-col layout ── */
    .tx-grid {
      display: grid; grid-template-columns: 1fr 300px;
      gap: 16px; align-items: start;
    }
    .tx-sidebar-col { display: flex; flex-direction: column; gap: 14px; }

    /* ── Summary pills ── */
    .summary-row { display: flex; gap: 10px; margin-bottom: 0; flex-direction: column; }
    .summary-pill {
      background: var(--bg-card); border-radius: 12px;
      padding: 14px 18px;
    }
    .summary-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .summary-value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .summary-value.red { color: var(--red); }
    .summary-value.green { color: var(--green); }

    /* ── Card ── */
    .card { background: var(--bg-card); border-radius: 16px; padding: 20px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .card-title-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }

    /* ── Transactions ── */
    .tx-scroll { max-height: 600px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
    .tx-scroll::-webkit-scrollbar { width: 4px; }
    .tx-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .tx-item {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--bg-card-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; margin-right: 14px;
    }
    .tx-info { flex: 1; }
    .tx-merchant { font-size: 14px; font-weight: 500; }
    .tx-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .tx-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .tx-amount.negative { color: var(--text); }
    .tx-amount.positive { color: var(--green); }
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 13px; }

    .btn-show-more {
      width: 100%; margin-top: 12px; padding: 11px;
      background: rgba(255,255,255,0.06); border: none; border-radius: 100px;
      color: var(--text); font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s;
    }
    .btn-show-more:hover { background: rgba(255,255,255,0.1); }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 13px 18px; border-radius: 12px; font-size: 13px; font-weight: 500; backdrop-filter: blur(20px); animation: toastIn 0.35s ease both; max-width: 320px; }
    .toast.error { background: rgba(255,67,58,0.15); border: 1px solid rgba(255,67,58,0.25); color: #FF453A; }
    .toast.success { background: rgba(48,209,88,0.12); border: 1px solid rgba(48,209,88,0.25); color: #30D158; }
    .toast.fade-out { animation: toastOut 0.3s ease both; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(40px); } }

    @media (max-width: 900px) {
      .tx-grid { grid-template-columns: 1fr; }
      .summary-row { flex-direction: row; flex-wrap: wrap; }
      .summary-pill { flex: 1; min-width: 120px; }
    }
    @media (max-width: 600px) {
      .content { padding: 0 16px 48px; }
      .toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <aside class="sidebar">
    <a href="/dashboard.html" class="sidebar-logo"><div class="logo-icon">H</div></a>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item" data-label="Home">
        <span class="nav-icon">⌂</span><span class="nav-tooltip">Dashboard</span>
      </a>
      <a href="/transactions.html" class="nav-item active" data-label="Txns">
        <span class="nav-icon">↕</span><span class="nav-tooltip">Transactions</span>
      </a>
      <a href="/savings.html" class="nav-item" data-label="Save">
        <span class="nav-icon">🔐</span><span class="nav-tooltip">Savings</span>
      </a>
      <a href="/settings.html" class="nav-item" data-label="More">
        <span class="nav-icon">⚙</span><span class="nav-tooltip">Settings</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="nav-item logout" onclick="handleLogout()">
        <span class="nav-icon">⏻</span><span class="nav-tooltip">Log Out</span>
      </button>
    </div>
  </aside>

  <main class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Transactions</div>
        <div class="page-sub">All your spending in one place</div>
      </div>
    </div>

    <div class="tx-grid">
      <!-- Left: toolbar + list -->
      <div>
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="search-wrap">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input class="search-input" id="search-input" type="text" placeholder="Search transactions..." oninput="filterTransactions()" />
          </div>
          <select class="filter-select" id="filter-type" onchange="filterTransactions()">
            <option value="all">All types</option>
            <option value="spent">Spent</option>
            <option value="income">Income</option>
          </select>
          <select class="filter-select" id="filter-cat" onchange="filterTransactions()">
            <option value="all">All categories</option>
          </select>
        </div>

        <!-- Transactions card -->
        <div class="card">
          <div class="card-title">
            <span>All Transactions</span>
            <span class="card-title-sub" id="tx-showing"></span>
          </div>
          <div id="tx-list">
            <div class="empty-state">Connect a bank account to see transactions</div>
          </div>
        </div>
      </div>

      <!-- Right: summary pills -->
      <div class="tx-sidebar-col">
        <div class="summary-row">
          <div class="summary-pill">
            <div class="summary-label">Total Transactions</div>
            <div class="summary-value" id="total-count">—</div>
          </div>
          <div class="summary-pill">
            <div class="summary-label">Total Spent</div>
            <div class="summary-value red" id="total-spent">—</div>
          </div>
          <div class="summary-pill">
            <div class="summary-label">Total Income</div>
            <div class="summary-value green" id="total-income">—</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vsmiguhndgjmygbxhage.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzbWlndWhuZGdqbXlnYnhoYWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDY2NTYsImV4cCI6MjA5MDM4MjY1Nn0.xhPxYmIxBdJu856e63WQna_fQTC1FRqILZcuctemIpo';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allTransactions = [];
    let filteredTransactions = [];
    let txPage = 0;
    const TX_PER_PAGE = 20;

    function formatCurrency(v) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v);
    }
    function formatDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function getTxIcon(name, cat) {
      const n = (name || '').toLowerCase();
      if (n.includes('uber') || n.includes('lyft')) return '🚗';
      if (n.includes('mcdonald') || n.includes('burger') || n.includes('kfc')) return '🍔';
      if (n.includes('starbucks') || n.includes('coffee')) return '☕';
      if (n.includes('amazon') || n.includes('shop')) return '🛍️';
      if (n.includes('netflix') || n.includes('spotify') || n.includes('apple')) return '📱';
      if (n.includes('airline') || n.includes('flight') || n.includes('delta')) return '✈️';
      if (n.includes('hotel') || n.includes('airbnb')) return '🏨';
      if (n.includes('gym') || n.includes('fitness')) return '💪';
      if (n.includes('pharmacy') || n.includes('cvs')) return '💊';
      if (n.includes('pizza') || n.includes('restaurant') || n.includes('sushi')) return '🍽️';
      const c = ((cat && cat[0]) || '').toLowerCase();
      if (c.includes('food') || c.includes('dining')) return '🍽️';
      if (c.includes('travel') || c.includes('transport')) return '✈️';
      if (c.includes('shopping')) return '🛍️';
      if (c.includes('health')) return '💊';
      if (c.includes('entertainment')) return '🎬';
      if (c.includes('bill')) return '📄';
      return '💳';
    }

    function renderTxItem(tx) {
      const isNeg = tx.amount > 0;
      const merchant = escapeHtml(tx.merchant_name || tx.name || 'Unknown');
      const categories = escapeHtml((tx.category || []).join(', ') || 'Uncategorized');
      const icon = getTxIcon(tx.merchant_name || tx.name, tx.category);
      return `
        <div class="tx-item">
          <div class="tx-icon">${icon}</div>
          <div class="tx-info">
            <div class="tx-merchant">${merchant}</div>
            <div class="tx-meta">${escapeHtml(formatDate(tx.date))} · ${categories}</div>
          </div>
          <span class="tx-amount ${isNeg ? 'negative' : 'positive'}">${isNeg ? '-' : '+'}${formatCurrency(Math.abs(tx.amount))}</span>
        </div>`;
    }

    function renderPage() {
      const container = document.getElementById('tx-list');
      const showingEl = document.getElementById('tx-showing');
      if (filteredTransactions.length === 0) {
        container.innerHTML = '<div class="empty-state">No transactions match your filters</div>';
        if (showingEl) showingEl.textContent = '';
        return;
      }
      const visible = filteredTransactions.slice(0, (txPage + 1) * TX_PER_PAGE);
      const hasMore = filteredTransactions.length > visible.length;
      if (showingEl) showingEl.textContent = `Showing ${visible.length} of ${filteredTransactions.length}`;
      container.innerHTML = `
        <div class="tx-scroll">
          <div id="tx-items">${visible.map(renderTxItem).join('')}</div>
        </div>
        ${hasMore ? '<button class="btn-show-more" onclick="showMoreTx()">Show more</button>' : ''}`;
    }

    function showMoreTx() { txPage++; renderPage(); }

    function filterTransactions() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const type = document.getElementById('filter-type').value;
      const cat = document.getElementById('filter-cat').value;
      filteredTransactions = allTransactions.filter(tx => {
        const name = (tx.merchant_name || tx.name || '').toLowerCase();
        if (q && !name.includes(q)) return false;
        if (type === 'spent' && tx.amount <= 0) return false;
        if (type === 'income' && tx.amount > 0) return false;
        if (cat !== 'all' && !(tx.category || []).includes(cat)) return false;
        return true;
      });
      txPage = 0;
      renderPage();
    }

    async function getAuthHeaders() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return {};
      return { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' };
    }

    async function loadTransactions() {
      try {
        const headers = await getAuthHeaders();
        const res = await fetch('/api/transactions', { headers });
        if (res.status === 401) { navigateTo('/login.html'); return; }
        const data = await res.json();
        const txs = data.transactions || [];
        allTransactions = txs;
        filteredTransactions = txs;

        // Summary
        let spent = 0, income = 0;
        txs.forEach(tx => { if (tx.amount > 0) spent += tx.amount; else income += Math.abs(tx.amount); });
        document.getElementById('total-count').textContent = txs.length;
        document.getElementById('total-spent').textContent = formatCurrency(spent);
        document.getElementById('total-income').textContent = formatCurrency(income);

        // Category filter options
        const cats = [...new Set(txs.flatMap(tx => tx.category || []))].sort();
        const sel = document.getElementById('filter-cat');
        cats.forEach(c => {
          const o = document.createElement('option');
          o.value = c; o.textContent = c; sel.appendChild(o);
        });

        renderPage();
      } catch {
        showToast('Failed to load transactions.', 'error');
      }
    }

    function navigateTo(url) {
      document.body.classList.add('fade-out');
      setTimeout(() => window.location.href = url, 220);
    }

    function showToast(msg, type = 'error') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
      setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 4000);
    }

    async function handleLogout() {
      await supabaseClient.auth.signOut();
      navigateTo('/login.html');
    }

    (async function() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { navigateTo('/login.html'); return; }
      document.body.classList.add('loaded');
      loadTransactions();
    })();
  </script>
</body>
</html>
